server:
  port: 8080

spring:
  application:
    name: appointment-api


  # --- BASE DE DATOS ---
  datasource:
    url: jdbc:postgresql://localhost:5432/medical_appointment_db
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # --- ORM Y PERSISTENCIA ---
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate # Protección estricta: Hibernate no toca la BD

  # --- MIGRACIONES ---
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# --- DOCUMENTACIÓN DE LA API ---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
